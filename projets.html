<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Épreuve E5 | Théo Cayeux</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* S'assure que la page prend toute la hauteur pour centrer le contenu */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color, #0a0a0a);
        }

        /* Conteneur principal centré */
        .e5-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: -50px; /* Compense la navbar pour un centrage parfait */
        }

        .e5-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            /* Effet de texte en dégradé */
            background: linear-gradient(90deg, #bf5af2, #ff2a5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .e5-subtitle {
            color: var(--text-muted, #a1a1aa);
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.5;
        }

        /* Style du gros bouton PowerPoint */
        .btn-powerpoint {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #bf5af2, #8e2de2);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(191, 90, 242, 0.4);
            border: none; /* Nécessaire car on utilise la balise <button> maintenant */
            cursor: pointer;
            font-family: inherit;
            margin-top: 30px;
        }

        .btn-powerpoint:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 40px rgba(191, 90, 242, 0.6);
            color: white;
        }

        .btn-icon {
            margin-right: 15px;
            font-size: 1.5rem;
        }

        /* Ajout d'une ombre et d'arrondis sur la présentation pour un côté plus premium */
        #presentation-iframe {
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">THÉO CAYEUX.</a></div>
        
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <a href="index.html#experience">Expériences</a>
            <a href="index.html#competences">Compétences</a>
            <a href="index.html#formation">Formations</a>
            <a href="projets.html">Projets</a>
            <a href="cv.html">Mon CV</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="e5-container">
        <h1 class="e5-title">Épreuve E5</h1>
        <p class="e5-subtitle">Présentation des projets techniques et solutions d'infrastructure, systèmes et réseaux.</p>
        
        <iframe id="presentation-iframe" src="https://gamma.app/embed/4vm6pga61rprfmo" style="width: 800px; max-width: 100%; height: 450px; border: none;" allow="fullscreen" title="Épreuve E5 - Support et mise à disposition de services informatiques"></iframe>
    
        <button onclick="openFullscreen()" class="btn-powerpoint">
            <span class="btn-icon">🖥️</span> Mettre en plein écran
        </button>
    </main>

    <script>
        // Fonction pour le menu mobile
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }

        // Fonction pour mettre la présentation en plein écran
        function openFullscreen() {
            var elem = document.getElementById("presentation-iframe");
            
            // Compatibilité avec les différents navigateurs
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
