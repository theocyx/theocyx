<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Épreuve E5 | Théo Cayeux</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Animation d'apparition fluide (comme sur la page contact) */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            background-color: var(--bg-color, #0a0a0a);
        }

        .e5-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: -30px; /* Ajustement pour centrer visuellement avec la navbar */
            animation: fadeIn 1s ease-out; /* Application de l'animation */
        }

        /* Style de titre identique à la page contact */
        .e5-title {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Style de texte identique à la page contact */
        .e5-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Style de la présentation Iframe */
        #presentation-iframe {
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px; /* Espace entre la présentation et le bouton */
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">THÉO CAYEUX.</a></div>
        
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <a href="index.html#experience">Expériences</a>
            <a href="index.html#competences">Compétences</a>
            <a href="index.html#certifications">Certifications</a>
            <a href="index.html#formation">Formations</a>
            <a href="projets.html">Projets</a>
            <a href="cv.html">Mon CV</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="e5-wrapper">
        <h1 class="e5-title">Épreuve E5.</h1>
        
        <p class="e5-subtitle">
            Présentation des projets et réalisations réalisé pendant le BTS SIO pour l'épreuve E5.
        </p>
            
        <a href="Diaporama_E5_Theo_Cayeux.pptx" download="Diaporama_E5_Theo_Cayeux.pptx" class="btn-cta" style="font-size: 1.1rem; padding: 15px 40px; text-decoration: none;">
            Télécharger le PowerPoint
        </a>
    </section>

    <script>
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
    </script>

</body>
</html>
