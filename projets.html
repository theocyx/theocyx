<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Épreuve E5 | Théo Cayeux</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* S'assure que la page prend toute la hauteur pour centrer le contenu */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color, #0a0a0a);
        }

        /* Conteneur principal centré */
        .e5-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: -50px; /* Compense la navbar pour un centrage parfait */
        }

        .e5-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            /* Effet de texte en dégradé */
            background: linear-gradient(90deg, #bf5af2, #ff2a5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .e5-subtitle {
            color: var(--text-muted, #a1a1aa);
            font-size: 1.2rem;
            margin-bottom: 50px;
            max-width: 600px;
            line-height: 1.5;
        }

        /* Style du gros bouton PowerPoint */
        .btn-powerpoint {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #bf5af2, #8e2de2);
            color: white;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(191, 90, 242, 0.4);
        }

        .btn-powerpoint:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 40px rgba(191, 90, 242, 0.6);
            color: white;
        }

        .btn-icon {
            margin-right: 15px;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo"><a href="index.html">THÉO CAYEUX.</a></div>
        
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <a href="index.html#experience">Expériences</a>
            <a href="index.html#competences">Compétences</a>
            <a href="index.html#formation">Formations</a>
            <a href="projets.html">Projets</a>
            <a href="cv.html">Mon CV</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="e5-container">
        <h1 class="e5-title">Épreuve E5</h1>
        <p class="e5-subtitle">Présentation des projets techniques et solutions d'infrastructure, systèmes et réseaux.</p>
        
       <iframe src="https://gamma.app/embed/4vm6pga61rprfmo" style="width: 700px; max-width: 100%; height: 450px" allow="fullscreen" title="Épreuve E5 - Support et mise à disposition de services informatiques"></iframe>
    </main>

    <script>
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
    </script>

</body>
</html>
